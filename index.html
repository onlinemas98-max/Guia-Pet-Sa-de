  <h2>Cachorro vomitando: o que pode ser?</h2>

  <p>Ver um <strong>cachorro vomitando</strong> pode ser preocupante para qualquer tutor. Esse é um sintoma comum, mas que pode indicar desde situações simples até problemas mais graves de saúde. Por isso, entender <strong>cachorro vomitando o que pode ser</strong> é essencial para agir corretamente e garantir o bem-estar do seu pet.</p>

  <p>O vômito em cães pode acontecer de forma isolada ou frequente. Em muitos casos, está relacionado à alimentação, mas também pode ser sinal de doenças. Neste guia completo, você vai descobrir as principais causas, quando se preocupar e o que fazer.</p>

  <h2>Principais causas de cachorro vomitando</h2>

  <h3>1. Alimentação inadequada</h3>
  <p>Uma das causas mais comuns de cachorro vomitando é a ingestão de alimentos inadequados. Comer restos de comida, alimentos gordurosos ou até lixo pode irritar o estômago do animal e provocar vômito.</p>

  <h3>2. Comer muito rápido</h3>
  <p>Alguns cães têm o hábito de comer rapidamente, o que pode causar má digestão e levar ao vômito logo após a alimentação.</p>

  <h3>3. Mudança de ração</h3>
  <p>A troca repentina de ração pode causar desconforto gastrointestinal. O ideal é fazer a transição de forma gradual ao longo de alguns dias.</p>

  <h3>4. Gastrite em cães</h3>
  <p>A gastrite é uma inflamação no estômago que pode causar vômitos frequentes. Ela pode ser provocada por estresse, alimentação inadequada ou ingestão de substâncias tóxicas.</p>

  <h3>5. Parasitas intestinais</h3>
  <p>Vermes são uma causa comum, principalmente em filhotes. Por isso, manter a vermifugação em dia é fundamental para evitar problemas.</p>

  <h3>6. Doenças mais graves</h3>
  <p>Problemas como pancreatite, infecções virais e doenças renais também podem causar vômito. Nesses casos, geralmente o cachorro apresenta outros sintomas além do vômito.</p>

  <h2>Tipos de vômito em cachorro</h2>

  <p>Observar o tipo de vômito pode ajudar a identificar o problema:</p>

  <ul>
    <li><strong>Vômito amarelo:</strong> geralmente é bile e acontece quando o cachorro fica muito tempo sem comer.</li>

    <li><strong>Vômito com comida:</strong> pode indicar digestão inadequada ou ingestão rápida.</li>
  </ul>

  <p>Se o seu cachorro apresentar esses sintomas, é importante procurar um veterinário o quanto antes.</p>

<h3>Cachorro com diarreia o que fazer: principais causas</h3>

<p>Antes de tomar qualquer atitude, é importante entender que a diarreia não é uma doença em si, mas um sintoma. Entre as causas mais comuns estão mudanças bruscas na alimentação, ingestão de alimentos inadequados, restos de comida, lixo ou até algo estragado.</p>

<p>Outros sintomas importantes incluem vômito, febre, fraqueza, desidratação e falta de interesse por comida ou água. Filhotes e cães idosos merecem atenção redobrada, pois podem piorar mais rapidamente.</p>

<p>Se o cachorro com diarreia estiver ativo, sem outros sintomas graves, algumas medidas simples podem ajudar. A primeira delas é garantir que ele tenha acesso constante a água fresca, já que a perda de líquidos pode levar à desidratação.</p>

<p>Outro ponto importante é quando o cachorro já tem algum problema de saúde ou é muito jovem. Nessas situações, o organismo é mais sensível e pode reagir de forma mais intensa.</p>

            { id: 'urina', title: 'Cachorro urinando sangue o que pode ser', excerpt: 'Sangue na urina é sempre um sinal de alerta grave.', category: 'saude', content: 'Pode indicar infecção urinária, cálculos ou envenenamento. Exige exames imediatos.' },
            { id: 'barriga', title: 'Cachorro com barriga inchada o que pode ser', excerpt: 'Pode indicar gases ou a perigosa torção gástrica.', category: 'saude', content: 'Barriga inchada e dura pode ser sinal de verminoses ou torção gástrica. É uma emergência de vida ou morte.' },
            { id: 'tosse', title: 'Cachorro com tosse o que pode ser', excerpt: 'Irritação simples ou a famosa tosse dos canis.', category: 'saude', content: 'Pode indicar problemas cardíacos ou infecções respiratórias. A tosse dos canis é altamente contagiosa.' },
            { id: 'halito', title: 'Cachorro com mau hálito o que pode ser', excerpt: 'Higiene bucal e problemas digestivos.', category: 'cuidados', content: 'Geralmente causado por tártaro. Hálito com cheiro estranho pode indicar problemas renais ou diabetes.' },
            { id: 'olho_vermelho', title: 'Cachorro com olho vermelho o que pode ser', excerpt: 'Conjuntivite ou problemas mais graves.', category: 'saude', content: 'Vermelhidão pode ser irritação ou glaucoma. Se o cão coçar muito, procure ajuda.' },
            { id: 'coceira', title: 'Cachorro com coceira o que pode ser', excerpt: 'Alergias, pulgas e fungos.', category: 'saude', content: 'Causas comuns são dermatite por pulga ou alergias alimentares. O controle de parasitas é o primeiro passo.' },
            { id: 'carrapato', title: 'Cachorro com carrapato o que fazer', excerpt: 'Como remover com segurança e prevenir doenças.', category: 'cuidados', content: 'Carrapatos transmitem doenças graves. Remova com pinça sem esmagar. Use preventivos regularmente.' },
            { id: 'pulga', title: 'Cachorro com pulga como eliminar', excerpt: 'Acabe com a infestação no pet e no ambiente.', category: 'cuidados', content: 'Trate o animal e o ambiente. Aspire a casa com frequência e use produtos específicos.' },
            { id: 'ferida', title: 'Cachorro com ferida na pele o que pode ser', excerpt: 'Feridas por lambedura, fungos ou infecções.', category: 'saude', content: 'Qualquer ferida que não cicatriza deve ser avaliada. Pode ser sarna ou fungos. Mantenha limpo.' },
            { id: 'dor_pata', title: 'Cachorro com dor na pata o que pode ser', excerpt: 'Cortes ou problemas articulares.', category: 'saude', content: 'Verifique objetos estranhos. A dor pode ser reflexo de problemas na coluna ou displasia.' },
            { id: 'mancando', title: 'Cachorro mancando o que pode ser', excerpt: 'Lesões na pata ou problemas articulares.', category: 'saude', content: 'Verifique as almofadinhas. Pode ser luxação de patela ou ruptura de ligamento.' },
            { id: 'secrecao', title: 'Cachorro com secreção no olho o que pode ser', excerpt: 'Remela excessiva indica infecção.', category: 'saude', content: 'Secreção amarelada pode ser conjuntivite. Limpe com soro fisiológico.' },
            { id: 'nariz_seco', title: 'Cachorro com nariz seco é normal', excerpt: 'Quando é fisiológico ou sinal de febre.', category: 'saude', content: 'Nem sempre é febre. Ocorre após o sono ou sol. Se houver rachaduras, procure um veterinário.' },
            { id: 'respirando_rapido', title: 'Cachorro respirando rápido o que pode ser', excerpt: 'Calor ou problemas pulmonares.', category: 'saude', content: 'Em repouso é preocupante. Pode indicar dor ou anemia. Língua roxa é emergência.' },
            { id: 'soluco', title: 'Cachorro com soluço é normal', excerpt: 'Comum em filhotes.', category: 'comportamento', content: 'Geralmente acontece após comer rápido. Passa sozinho em minutos.' },
            { id: 'espirrando', title: 'Cachorro espirrando muito o que pode ser', excerpt: 'Alergias ou corpo estranho.', category: 'saude', content: 'Espirros constantes podem indicar rinite ou algo preso. Sangramento é urgente.' },
            { id: 'vomito_amarelo', title: 'Cachorro com vômito amarelo o que pode ser', excerpt: 'Líquido biliar por estômago vazio.', category: 'saude', content: 'Acontece quando o cão fica muito tempo sem comer. Fracione as refeições.' },
            { id: 'diarreia_sangue', title: 'Cachorro com diarreia com sangue', excerpt: 'Emergência que indica lesão intestinal.', category: 'saude', content: 'Pode ser parvovirose ou verminose. O animal precisa de atendimento urgente.' },
            { id: 'chorando', title: 'Cachorro chorando muito o que pode ser', excerpt: 'Pedido de ajuda por dor ou carência.', category: 'comportamento', content: 'Choram por dor, fome ou ansiedade. Se for repentino, pode ser dor intensa.' },
            { id: 'latindo', title: 'Cachorro latindo muito o que fazer', excerpt: 'Lide com latidos por tédio ou medo.', category: 'comportamento', content: 'Indicam tédio ou ansiedade. Enriquecimento ambiental ajuda muito.' },
            { id: 'destruindo', title: 'Cachorro destruindo coisas o que fazer', excerpt: 'Energia acumulada ou ansiedade.', category: 'comportamento', content: 'Falta de estímulo. Aumente passeios e ofereça brinquedos.' },
            { id: 'cavando', title: 'Cachorro cavando buraco no quintal', excerpt: 'Instinto ou busca por frescor.', category: 'comportamento', content: 'Comportamento natural. Ofereça uma área própria para ele cavar.' },
            { id: 'uivando', title: 'Cachorro uivando muito o que significa', excerpt: 'Herança ancestral de comunicação.', category: 'comportamento', content: 'Respondem a sons agudos ou por solidão. Reduza a ansiedade de separação.' },
            { id: 'mordendo', title: 'Cachorro mordendo tudo o que fazer', excerpt: 'Comum em filhotes.', category: 'comportamento', content: 'Exploram o mundo. Redirecione para brinquedos adequados.' },
            { id: 'fogos', title: 'Cachorro com medo de fogos o que fazer', excerpt: 'Proteja seu pet de ruídos altos.', category: 'comportamento', content: 'Crie um refúgio seguro. Nunca force o cão a enfrentar o barulho.' },
            { id: 'ansiedade', title: 'Cachorro com ansiedade o que fazer', excerpt: 'Identifique sinais de estresse.', category: 'comportamento', content: 'Causa destruição e latidos. Requer exercícios e enriquecimento.' },
            { id: 'agitado', title: 'Cachorro muito agitado o que pode ser', excerpt: 'Falta de rotina ou energia.', category: 'comportamento', content: 'Falta de exercícios. Passeios e jogos de faro ajudam.' },
            { id: 'triste', title: 'Cachorro triste o que fazer', excerpt: 'Identifique a depressão canina.', category: 'comportamento', content: 'Mudanças na rotina causam apatia. Interação social é fundamental.' },
            { id: 'dormindo', title: 'Cachorro dormindo muito é normal', excerpt: 'Sono natural ou sinal de doença.', category: 'saude', content: 'Dormem 12-14h. Se for excessivo, pode ser hipotireoidismo ou dor.' },
            { id: 'lambendo_pata', title: 'Cachorro lambendo a pata o que pode ser', excerpt: 'Alergias ou ansiedade.', category: 'comportamento', content: 'Sinal de alergia ou estresse. Umidade pode causar fungos.' },
            { id: 'queda_pelo', title: 'Cachorro com queda de pelo o que pode ser', excerpt: 'Troca natural ou problemas de saúde.', category: 'cuidados', content: 'Pode ser sazonal ou sarna. Boa alimentação ajuda na pelagem.' },
            { id: 'pele_vermelha', title: 'Cachorro com pele vermelha o que pode ser', excerpt: 'Inflamação ou alergia.', category: 'saude', content: 'Sinal de irritação. Banhos medicinais podem ser necessários.' },
            { id: 'alergia_pele', title: 'Cachorro com alergia na pele', excerpt: 'Diferença entre alimentar e atopia.', category: 'saude', content: 'Problemas crônicos. Controle a coceira e fortaleça a pele.' },
            { id: 'caspa', title: 'Cachorro com caspa o que pode ser', excerpt: 'Pele seca ou oleosidade.', category: 'cuidados', content: 'Banhos quentes ou ar seco. Use produtos hidratantes.' },
            { id: 'dor_ouvido', title: 'Cachorro com dor de ouvido sintomas', excerpt: 'Otites causam muito desconforto.', category: 'saude', content: 'Coçam as orelhas e inclinam a cabeça. Cheiro forte é comum.' },
            { id: 'sacudindo_cabeca', title: 'Cachorro sacudindo a cabeça o que pode ser', excerpt: 'Incômodo no canal auditivo.', category: 'saude', content: 'Indica otite ou algo preso. Pode causar hematomas na orelha.' },
            { id: 'ouvido_inflamado', title: 'Cachorro com ouvido inflamado', excerpt: 'Limpeza e medicação específica.', category: 'saude', content: 'Pode ser bacteriana ou fúngica. Requer gotas otológicas.' },
            { id: 'dificuldade_andar', title: 'Cachorro com dificuldade para andar', excerpt: 'Problemas neurológicos ou ortopédicos.', category: 'saude', content: 'Hérnia de disco ou artrite. Fisioterapia ajuda muito.' },
            { id: 'convulsao', title: 'Cachorro com convulsão o que fazer', excerpt: 'Proteja o animal durante o episódio.', category: 'saude', content: 'Não coloque a mão na boca. Afaste móveis e leve ao médico.' },
            { id: 'lingua_roxa', title: 'Cachorro com língua roxa o que pode ser', excerpt: 'Falta de oxigênio - Emergência.', category: 'saude', content: 'Sinal de que o oxigênio não chega aos tecidos. Emergência absoluta.' },
            { id: 'baba_excessiva', title: 'Cachorro com baba excessiva', excerpt: 'Náusea, dor ou envenenamento.', category: 'saude', content: 'Problemas nos dentes ou intoxicação. Observe outros sinais.' },
            { id: 'olho_lacrimejando', title: 'Cachorro com olho lacrimejando', excerpt: 'Irritação ou duto obstruído.', category: 'saude', content: 'Cílios para dentro ou duto entupido. Limpe com soro.' },
            { id: 'respiracao_ofegante', title: 'Cachorro com respiração ofegante', excerpt: 'Troca de calor ou dor.', category: 'saude', content: 'Normal no calor, mas em repouso indica dor ou coração.' },
            { id: 'dificuldade_respirar', title: 'Cachorro com dificuldade para respirar', excerpt: 'Emergência respiratória.', category: 'saude', content: 'Sofrimento respiratório. Procure ajuda veterinária imediata.' }
        ];

        function init() { lucide.createIcons(); renderGrid(ARTICLES); }
        function renderGrid(list) {
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = list.map(a => `
                <div onclick="showArticle('${a.id}')" class="group bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:shadow-green-500/5 hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="flex items-start justify-between mb-4">
                        <div class="p-2 rounded-lg ${getCategoryClass(a.category)}"><i data-lucide="${getCategoryIcon(a.category)}" size="20"></i></div>
                        <i data-lucide="chevron-right" class="text-gray-300 group-hover:text-green-500 transition-colors" size="20"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2 group-hover:text-green-600 transition-colors">${a.title}</h3>
                    <p class="text-gray-600 text-sm line-clamp-2">${a.excerpt}</p>
                </div>`).join('');
            lucide.createIcons();
        }
        function getCategoryClass(c) { return c === 'saude' ? 'bg-red-50 text-red-500' : c === 'comportamento' ? 'bg-blue-50 text-blue-500' : 'bg-green-50 text-green-500'; }
        function getCategoryIcon(c) { return c === 'saude' ? 'activity' : c === 'comportamento' ? 'heart' : 'info'; }
        function filterArticles() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderGrid(ARTICLES.filter(a => a.title.toLowerCase().includes(q) || a.excerpt.toLowerCase().includes(q)));
        }
        function showPage(p) {
            document.getElementById('home-page').classList.toggle('hidden', p !== 'home');
            document.getElementById('article-page').classList.toggle('hidden', p === 'home');
            window.scrollTo(0, 0); closeMenu();
        }
        function showArticle(id) {
            const a = ARTICLES.find(x => x.id === id); if (!a) return;
            document.getElementById('article-content').innerHTML = `
                <div class="space-y-4">
                    <span class="px-3 py-1 bg-green-50 text-green-600 text-xs font-bold uppercase tracking-wider rounded-full">${a.category}</span>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 leading-tight">${a.title}</h1>
                </div>
                <div class="text-gray-700 leading-relaxed text-lg prose">${a.content.split('\n').map(p => `<p>${p}</p>`).join('')}</div>
                <div class="pt-8 border-t border-gray-100 mt-12"><div class="bg-yellow-50 p-6 rounded-2xl flex gap-4 items-start"><div class="bg-yellow-100 p-2 rounded-lg text-yellow-700"><i data-lucide="info" size="20"></i></div><div class="space-y-1"><h4 class="font-bold text-yellow-900">Aviso</h4><p class="text-sm text-yellow-800">Este conteúdo é informativo. Procure um veterinário.</p></div></div></div>`;
            showPage('article'); lucide.createIcons();
        }
        function toggleMenu() {
            const m = document.getElementById('mobile-menu'); const i = document.getElementById('menu-icon');
            const open = !m.classList.contains('hidden');
            m.classList.toggle('hidden'); i.setAttribute('data-lucide', open ? 'menu' : 'x'); lucide.createIcons();
        }
        function closeMenu() { document.getElementById('mobile-menu').classList.add('hidden'); const i = document.getElementById('menu-icon'); if(i) i.setAttribute('data-lucide', 'menu'); lucide.createIcons(); }
        window.onload = init;
    </script>
</body>
</html>
